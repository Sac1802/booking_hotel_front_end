<div class="home-container">
    <app-search-form (search)="onSearch($event)"></app-search-form>

    @if(errorMessage()){
    <div class="error">
        <p>{{errorMessage()}}</p>
    </div>
    }

    @if(searchService.isLoading()){
    <p>Cargando Resultados</p>
    }@else {
    <app-hotel-list [hotels]="hotelsRes()"></app-hotel-list>
    }
</div>
