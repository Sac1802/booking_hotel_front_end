<div class="hotel-card">
    <div class="hotel-header">
        <div class="hotel-info">
            <h2 class="name-hotel">{{data().name}}</h2>
            @if (location()) {
            <p class="location-hotel">
                <mat-icon>location_on</mat-icon> {{location()}}
            </p>
            }
            <p class="desc-hotel">{{data().description}}</p>
            <div class="promotion-list">
                @for (item of promo()!; track item) {
                <span>{{item}}</span>
                }
            </div>
        </div>

        <div class="action">
            <button class="btn-book">Book</button>
        </div>
    </div>

    @if(suggestion().length > 0){
    <div class="suggestion-section">
        <div class="rooms-container">
            @for (item of suggestion(); track $index) {
            <app-room [room]="item"></app-room>
            }
        </div>
    </div>
    }
</div>
